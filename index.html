<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sword Slash Effect</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070c;
color:white;
overflow-x:hidden;
}

/* PAGES */
.page{
display:none;
padding:60px;
text-align:center;
}

.page.active{
display:block;
}

/* HEADER */
header{
padding:20px;
background:#0b0f1a;
text-align:center;
}

nav a{
color:#7fd4ff;
margin:0 10px;
cursor:pointer;
text-decoration:none;
}

/* ⚔️ SLASH OVERLAY */
#slashOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
pointer-events:none;
opacity:0;
}

#slashOverlay::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(120deg,transparent,#7fd4ff,white,#7fd4ff,transparent);
transform:skewX(-20deg);
box-shadow:0 0 25px #1aa3ff;
}

/* ACTIVE ANIMATION */
#slashOverlay.active{
opacity:1;
}

#slashOverlay.active::before{
animation:swordSlash 0.6s ease forwards;
}

@keyframes swordSlash{
0%{left:-120%;}
100%{left:120%;}
}
</style>

</head>

<body>

<!-- SLASH EFFECT -->
<div id="slashOverlay"></div>

<header>
<nav>
<a onclick="go('home')">Home</a>
<a onclick="go('lore')">Lore</a>
</nav>
</header>

<!-- HOME PAGE -->
<section id="home" class="page active">
<h1>Home Page</h1>
<p>Click navigation to see sword slash transition</p>
</section>

<!-- LORE PAGE -->
<section id="lore" class="page">
<h1>Lore Page</h1>
<p>This page opens with sword slash animation</p>
</section>

<script>
function swordSlash(){
let s=document.getElementById("slashOverlay");
s.classList.add("active");

setTimeout(()=>{
s.classList.remove("active");
},600);
}

function go(page){

swordSlash();

setTimeout(()=>{

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

},300);
}
</script>

</body>
</html>
