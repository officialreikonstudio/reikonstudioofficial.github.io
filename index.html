<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reikon Studio Platform</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070c;
color:#e6f7ff;
}

/* NAV */
header{
padding:20px;
background:#0b0f1a;
text-align:center;
}

nav a{
color:#7fd4ff;
margin:0 10px;
cursor:pointer;
text-decoration:none;
}

/* PAGE */
.page{display:none;padding:40px;}
.page.active{display:block;}

/* CARD */
.card{
background:rgba(15,25,40,0.85);
padding:15px;
border-radius:12px;
margin:10px 0;
border:1px solid #1aa3ff33;
}

/* INPUTS */
input,textarea,select{
width:100%;
margin:8px 0;
padding:10px;
background:#0f1928;
border:1px solid #1aa3ff33;
color:white;
}

/* BUTTON */
button{
padding:10px 15px;
background:#7fd4ff;
border:none;
cursor:pointer;
margin-top:10px;
}

/* CHAT */
.chatBox{
height:200px;
overflow:auto;
background:#0f1928;
padding:10px;
border-radius:10px;
}

.msg{
padding:5px;
border-bottom:1px solid #1aa3ff22;
}

/* LOGIN SCREEN */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>Reikon Account Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<header>
<nav>
<a onclick="go('home')">Home</a>
<a onclick="go('admin')">Admin</a>
<a onclick="go('wall')">Wallpapers</a>
<a onclick="go('char')">Characters</a>
<a onclick="go('chat')">Discussion</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page active">
<h2>Reikon Studio</h2>
</section>

<!-- ADMIN PANEL -->
<section id="admin" class="page">

<h2>Admin Panel</h2>

<h3>Create Volume</h3>
<input id="volName" placeholder="Volume Name">
<input id="volCover" placeholder="Cover Image URL">
<button onclick="addVolume()">Add Volume</button>

<h3>Create Chapter</h3>

<select id="volumeSelect"></select>
<input id="chTitle" placeholder="Chapter Title">
<textarea id="chContent" placeholder="Chapter Content"></textarea>
<button onclick="addChapter()">Add Chapter</button>

<h3>Character Design</h3>
<input id="charName" placeholder="Character Name">
<input id="charImg" placeholder="Image URL">
<textarea id="charInfo" placeholder="Info"></textarea>
<button onclick="addCharacter()">Add Character</button>

</section>

<!-- WALLPAPERS -->
<section id="wall" class="page">
<h2>Wallpapers</h2>
<input id="wallImg" placeholder="Wallpaper URL">
<button onclick="addWallpaper()">Add</button>
<div id="wallList"></div>
</section>

<!-- CHARACTERS -->
<section id="char" class="page">
<h2>Characters</h2>
<div id="charList"></div>
</section>

<!-- CHAT -->
<section id="chat" class="page">
<h2>Reader Discussion</h2>

<div class="chatBox" id="chatBox"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</section>

<script>

let volumes=[];
let chapters={};
let characters=[];
let wallpapers=[];
let chat=[];

/* LOGIN */
function login(){
document.getElementById("loginScreen").style.display="none";
}

/* NAV */
function go(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* VOLUME */
function addVolume(){
let v=document.getElementById("volName").value;
let c=document.getElementById("volCover").value;

volumes.push({v,c});
updateVolumeSelect();
alert("Volume added");
}

function updateVolumeSelect(){
let s=document.getElementById("volumeSelect");
s.innerHTML="";
volumes.forEach((v,i)=>{
s.innerHTML+=`<option value="${v.v}">${v.v}</option>`;
});
}

/* CHAPTER */
function addChapter(){
let v=document.getElementById("volumeSelect").value;
let t=document.getElementById("chTitle").value;
let c=document.getElementById("chContent").value;

if(!chapters[v]) chapters[v]=[];
chapters[v].push({t,c});

alert("Chapter added under volume "+v);
}

/* CHARACTER */
function addCharacter(){
let n=document.getElementById("charName").value;
let i=document.getElementById("charImg").value;
let d=document.getElementById("charInfo").value;

characters.push({n,i,d});
renderChar();
}

function renderChar(){
let box=document.getElementById("charList");
box.innerHTML="";
characters.forEach(c=>{
box.innerHTML+=`
<div class="card">
<h3>${c.n}</h3>
<img src="${c.i}" width="100%">
<p>${c.d}</p>
</div>`;
});
}

/* WALLPAPER */
function addWallpaper(){
let w=document.getElementById("wallImg").value;
wallpapers.push(w);

document.getElementById("wallList").innerHTML+=
`<div class="card"><img src="${w}" width="100%"></div>`;
}

/* CHAT */
function sendMsg(){
let m=document.getElementById("msg").value;
chat.push(m);

document.getElementById("chatBox").innerHTML+=
`<div class="msg">${m}</div>`;
}

</script>

</body>
  </html>
