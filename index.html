<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reikon Studio Platform</title>

<style>
body{
margin:0;
padding:0;
background:#05070c;
color:#e6f7ff;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* STARS */
.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.stars span{
position:absolute;
width:2px;
height:2px;
background:#7fd4ff;
box-shadow:0 0 10px #1aa3ff;
animation:fall linear infinite;
opacity:0;
}

@keyframes fall{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* INTRO CUTSCENE */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:99999;
transition:1s;
}

#intro h1{
color:#7fd4ff;
text-shadow:0 0 20px #1aa3ff;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* TRANSITION EFFECT */
#transition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:99998;
opacity:0;
pointer-events:none;
}

.slashFx{
position:absolute;
width:120%;
height:100%;
background:linear-gradient(120deg,transparent,#7fd4ff66,transparent);
transform:skewX(-20deg);
left:-120%;
}

.fireFx{
position:absolute;
bottom:0;
width:100%;
height:0%;
background:linear-gradient(to top,#ff3b00,#ff8c00,transparent);
}

#transition.active{
opacity:1;
}

#transition.active .slashFx{
animation:slashMove 0.8s ease forwards;
}

#transition.active .fireFx{
animation:fireRise 1s ease forwards;
}

@keyframes slashMove{
0%{left:-120%;}
100%{left:120%;}
}

@keyframes fireRise{
0%{height:0%;}
100%{height:100%;}
}

/* HEADER */
header{
padding:20px;
background:rgba(10,18,30,0.9);
border-bottom:1px solid #1aa3ff33;
text-align:center;
}

.logo{
font-size:32px;
color:#7fd4ff;
text-shadow:0 0 15px #1aa3ff;
}

/* NAV */
nav a{
color:#cfefff;
margin:0 10px;
text-decoration:none;
cursor:pointer;
font-weight:bold;
}

/* PAGES */
.page{
display:none;
padding:60px 20px;
text-align:center;
}

.page.active{
display:block;
}

/* HERO */
.hero img{
width:150px;
filter:drop-shadow(0 0 15px #1aa3ff);
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.hero h1{
color:#7fd4ff;
text-shadow:0 0 15px #1aa3ff;
}

/* CARDS */
.card{
background:rgba(15,25,40,0.8);
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
border:1px solid #1aa3ff33;
}

/* LN + WALLPAPER GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.item{
width:250px;
background:#0f1928;
padding:15px;
border-radius:12px;
border:1px solid #1aa3ff33;
}

.item img{
width:100%;
border-radius:10px;
}

.download{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#7fd4ff;
color:black;
text-decoration:none;
border-radius:20px;
font-size:14px;
}

/* CHARACTER ANIMATION */
.char{
opacity:0;
transform:translateY(50px);
animation:charIn 1s forwards;
}

.char:nth-child(1){animation-delay:0.2s;}
.char:nth-child(2){animation-delay:0.4s;}
.char:nth-child(3){animation-delay:0.6s;}

@keyframes charIn{
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="stars">
<span style="left:10%;animation-duration:5s;"></span>
<span style="left:30%;animation-duration:7s;"></span>
<span style="left:50%;animation-duration:6s;"></span>
<span style="left:70%;animation-duration:8s;"></span>
</div>

<!-- INTRO -->
<div id="intro">
<h1>Reikon Studio</h1>
<button onclick="startSite()">Start Experience</button>
</div>

<!-- TRANSITION -->
<div id="transition">
<div class="slashFx"></div>
<div class="fireFx"></div>
</div>

<!-- MUSIC -->
<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<header>
<div class="logo">REIKON STUDIO</div>
<nav>
<a onclick="go('home')">Home</a>
<a onclick="go('ln')">Light Novels</a>
<a onclick="go('wallpapers')">Wallpapers</a>
<a onclick="go('characters')">Characters</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page active">
<div class="hero">
<img src="file_00000000810c71fa9591436d979c2df6~2.png">
<h1>Official Reikon Studio</h1>
</div>
</section>

<!-- LN UPLOAD SECTION -->
<section id="ln" class="page">
<h2>Light Novels</h2>

<div class="grid">
<div class="item">
<h3>Raizen Chapter 1</h3>
<p>Read or download</p>
<a class="download" href="#">Download</a>
</div>
</div>
</section>

<!-- WALLPAPERS -->
<section id="wallpapers" class="page">
<h2>Wallpapers</h2>

<div class="grid">
<div class="item">
<img src="wall1.jpg">
<a class="download" href="wall1.jpg" download>Download</a>
</div>

<div class="item">
<img src="wall2.jpg">
<a class="download" href="wall2.jpg" download>Download</a>
</div>
</div>
</section>

<!-- CHARACTERS -->
<section id="characters" class="page">
<h2>Characters</h2>

<div class="card char">Raizen Enkaji</div>
<div class="card char">Aikari Mizuno</div>
<div class="card char">Kaito</div>
</section>

<script>

function startSite(){
document.getElementById("intro").style.display="none";
document.getElementById("bgm").play().catch(()=>{});
}

function go(page){

let t=document.getElementById("transition");
t.classList.add("active");

setTimeout(()=>{

t.classList.remove("active");

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

},1000);
}

</script>

</body>
  </html>
